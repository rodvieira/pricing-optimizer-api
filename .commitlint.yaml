min-version: v0.12.0
formatter: default
rules:
  - header-min-length
  - header-max-length
  - body-max-line-length
  - footer-max-line-length
  - type-enum
  - scope-enum
severity:
  default: error
  rules:
    scope-enum: error
settings:
  header-min-length:
    argument: 10
    flags: {}
  header-max-length:
    argument: 72
    flags: {}
  body-max-line-length:
    argument: 100
    flags: {}
  footer-max-line-length:
    argument: 100
    flags: {}
  type-enum:
    argument:
      - feat
      - fix
      - refactor
      - test
      - docs
      - chore
      - ci
      - build
      - perf
      - revert
    flags: {}
  scope-enum:
    argument:
      - domain
      - usecase
      - httpapi
      - scraper
      - llm
      - repository
      - cache
      - api
      - config
      - telemetry
      - db
      - openapi
      - deps
      - ci
      - docker
      - test
      - spec-kit
      - claude
    flags:
      allow-empty: true
disable-default-ignores: false
ignores: []
