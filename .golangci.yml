version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: standard
  enable:
    - bodyclose
    - contextcheck
    - copyloopvar
    - errorlint
    - gocritic
    - gosec
    - misspell
    - nilerr
    - noctx
    - revive
    - unconvert
    - unparam
    - wrapcheck
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    revive:
      rules:
        - name: exported
        - name: context-as-argument
        - name: error-return
        - name: error-strings
        - name: unreachable-code
  exclusions:
    generated: lax
    presets:
      - comments
      - std-error-handling
    rules:
      # Test files may use less strict rules.
      - path: _test\.go
        linters:
          - gosec
          - wrapcheck
          - unparam
      # Generated OpenAPI code is not ours to lint.
      - path: internal/api/.*\.gen\.go
        linters:
          - revive
          - unparam
          - wrapcheck

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/rodvieira/pricing-optimizer-api
